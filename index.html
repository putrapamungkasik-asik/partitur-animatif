<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TABKLUNG Pro - Legato Interlocking Engine (Massive & Reverb)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--note-black:#000000;--line-thick:1.8px;--beam-gap:3px;--beam-margin:2px;--page-width:210mm;--page-height:297mm;--active-red:#ff0000;}
*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
@page{size:A4;margin:0;}
body{background:#f8fafc;font-family:'Poppins',sans-serif;margin:0;padding:20px;padding-bottom:120px;scroll-behavior:smooth;}
.a4-page{background:white;width:var(--page-width);height:var(--page-height);margin:0 auto 30px auto;padding:12mm 15mm;position:relative;box-shadow:0 10px 30px rgba(0,0,0,0.1);overflow:hidden;display:flex;flex-direction:column;page-break-after:always;}
.sheet-header{display:flex;justify-content:space-between;align-items:center;border-bottom:2.5px solid #000;padding-bottom:5px;margin-bottom:15px;height:45px;flex-shrink:0;}
.staff-container{display:grid;grid-template-columns:repeat(4,1fr);grid-row-gap:12px;width:100%;height:260mm;align-content:start;}
.bar-box{border-left:1.5px solid var(--note-black);padding:8px 1px;position:relative;height:50mm;display:flex;flex-direction:column;justify-content:center;gap:4px;transition:all .3s ease;}
.bar-box:nth-child(4n){border-right:1.5px solid var(--note-black);}
.beat-unit.active-beat{background-color:rgba(59,130,246,0.2);border-radius:0;}
.bar-num{position:absolute;top:2px;left:5px;font-size:9px;font-weight:800;color:#cbd5e1;}
.layer-row{display:flex;height:18px;align-items:center;}
.beat-unit{display:grid;grid-template-columns:repeat(4,1fr);align-items:center;justify-items:center;position:relative;flex:1;padding-top:8px;}
.has-beam::before{content:"";position:absolute;top:4px;left:var(--beam-margin);right:var(--beam-margin);height:var(--line-thick);background:var(--note-black);z-index:10;}
.has-beam-2::after{content:"";position:absolute;top:calc(4px + var(--beam-gap));left:var(--beam-margin);right:var(--beam-margin);height:var(--line-thick);background:var(--note-black);z-index:10;}
.note{position:relative;width:100%;display:flex;justify-content:center;align-items:center;font-family:'Inter',sans-serif;font-size:13px;font-weight:800;line-height:1;color:var(--note-black);transition:transform .1s ease;}
.note.active{color:var(--active-red)!important;transform:scale(1.6);text-shadow:0 0 8px rgba(255,0,0,0.6);z-index:99;}
.empty{opacity:0;pointer-events:none;}
.dot{position:absolute;left:50%;transform:translateX(-50%);}
.dot-u{top:-8px;font-size:10px;}
.dot-u2{top:-14px;font-size:10px;}
.dot-d{bottom:-9px;font-size:10px;}
.dot-d2{bottom:-15px;font-size:10px;}
.slash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-25deg);font-size:14px;opacity:.6;}
.player-controls{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;align-items:center;gap:15px;background:white;padding:15px 35px;border-radius:99px;box-shadow:0 20px 40px rgba(0,0,0,0.15);border:2px solid #3b82f6;}
.btn-play{background:#3b82f6;color:white;padding:10px 25px;border-radius:99px;font-weight:800;cursor:pointer;}
.btn-stop{background:#f1f5f9;color:#475569;padding:10px 25px;border-radius:99px;font-weight:800;cursor:pointer;}
@media print{.no-print{display:none!important;}}
</style>
</head>
<body>

<div class="no-print flex justify-center py-10">
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 text-center max-w-sm w-full">
        <h1 class="text-2xl font-black text-blue-900 mb-1">TABKLUNG PRO</h1>
        <p class="text-xs text-gray-400 mb-6 font-bold tracking-widest">LEGATO ENGINE (DYNAMIC)</p>
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 text-left mb-1 uppercase tracking-wider">1. Load Score (JSON)</label>
                <input type="file" id="jsonInput" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            </div>
            <div>
                <p id="audioStatus" class="text-[10px] text-gray-400 text-left mt-2">Status Audio: Inisialisasi...</p>
            </div>
        </div>
    </div>
</div>

<div id="print-area"></div>

<div id="controls" class="no-print player-controls" style="display:none;">
    <div class="flex flex-col mr-6 border-r pr-6 border-gray-200">
        <span id="displayTempo" class="text-[10px] font-black text-blue-600">BPM: 120</span>
        <span id="displayBar" class="text-[10px] font-bold text-gray-400">BAR: 0 / 0</span>
    </div>
    <button onclick="togglePlay()" id="btnPlay" class="btn-play">PLAY</button>
    <button onclick="stopPlayback()" class="btn-stop">STOP</button>
</div>

<script>
let currentTick=0; let isPlaying=false; let playInterval; let globalTempo=120; let totalBarsCount=0; let rawData=null; let audioCtx; let angklungBuffer = null; 
const BASE_MIDI = 60; 
let globalKeyBaseMidi = 60; // Untuk menggeser visualisasi partitur
let globalAllBars = []; 
let activeVoices = {}; 
let reverbNode, reverbGain, dryGain; 

/** * KONVERSI DINAMIS MIDI KE ANGKLUNG (NADA NOMOR)
 */
function getAngklungNoteInfo(midi) {
    const noteLabels = ["1", "1/", "2", "2/", "3", "4", "4/", "5", "5/", "6", "6/", "7"];
    const val = parseInt(midi);
    // Menggunakan globalKeyBaseMidi agar bisa bergeser sesuai keyBase dari JSON
    const relative = val - globalKeyBaseMidi;
    const octave = Math.floor(relative / 12);
    const noteIdx = ((relative % 12) + 12) % 12;
    return { label: noteLabels[noteIdx], octave: octave };
}

function createSyntheticImpulseResponse(duration, decay) {
    const sampleRate = audioCtx.sampleRate;
    const length = sampleRate * duration;
    const impulse = audioCtx.createBuffer(2, length, sampleRate);
    for (let channel = 0; channel < 2; channel++) {
        const channelData = impulse.getChannelData(channel);
        for (let i = 0; i < length; i++) {
            channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
        }
    }
    return impulse;
}

function initAudio() {
    if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        reverbNode = audioCtx.createConvolver();
        reverbNode.buffer = createSyntheticImpulseResponse(2.5, 3.0);
        reverbGain = audioCtx.createGain();
        reverbGain.gain.setValueAtTime(0.35, audioCtx.currentTime); 
        dryGain = audioCtx.createGain();
        dryGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
        dryGain.connect(audioCtx.destination);
        reverbGain.connect(reverbNode);
        reverbNode.connect(audioCtx.destination);
    }
}

/** * INTEGRASI AUTO-LOAD AUDIO
 * Memuat file audio dari URL secara otomatis saat DOM siap.
 */
async function autoLoadAudio() {
    const statusText = document.getElementById('audioStatus');
    const audioUrl = "https://www.dropbox.com/scl/fi/ylh2s9m2q2alsvwcpwqjf/New-Project-1.mp3?rlkey=y9xa4tztu8fm7xirnoza9vbtu&st=4eg30b1d&raw=1";
    
    try {
        if(statusText) statusText.innerHTML = "Status Audio: <span class='text-blue-500 font-bold'>Sedang Mengunduh...</span>";
        initAudio();
        const response = await fetch(audioUrl);
        if(!response.ok) throw new Error("Gagal mengunduh audio dari server.");
        
        const arrayBuffer = await response.arrayBuffer();
        angklungBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        
        if(statusText) statusText.innerHTML = "Status Audio: <span class='text-green-500 font-bold'>Angklung Ready!</span>";
        console.log("Audio Angklung berhasil dimuat otomatis.");
    } catch (err) { 
        if(statusText) statusText.innerHTML = "Status Audio: <span class='text-red-500 font-bold'>Gagal Muat Audio Otomatis.</span>";
        console.error("Auto-load error:", err); 
    }
}

window.addEventListener('DOMContentLoaded', autoLoadAudio);

function playTone(midiNote, layerIdx, visualNode) {
    if (!angklungBuffer) return;
    initAudio();
    const now = audioCtx.currentTime;
    
    if (activeVoices[layerIdx]) {
        const prev = activeVoices[layerIdx];
        const crossFadeTime = 0.08; 
        if (prev.visualNode) prev.visualNode.classList.remove('active');
        try {
            prev.gains.forEach((g) => {
                g.gain.cancelScheduledValues(now);
                g.gain.setValueAtTime(g.gain.value, now);
                g.gain.setTargetAtTime(0, now, crossFadeTime / 3);
            });
            prev.sources.forEach((s) => s.stop(now + crossFadeTime + 0.1));
        } catch(e) {}
        delete activeVoices[layerIdx];
    }

    // BASE_MIDI di sini tetap 60 agar pitch audio absolut tidak rusak
    const ratio = Math.pow(2, (midiNote - BASE_MIDI) / 12);
    const loopStartTime = angklungBuffer.duration > 0.4 ? angklungBuffer.duration * 0.25 : 0;
    const loopEndTime = angklungBuffer.duration > 0.4 ? angklungBuffer.duration * 0.75 : angklungBuffer.duration;

    const sources = [];
    const gains = [];

    for (let i = 0; i < 2; i++) {
        const source = audioCtx.createBufferSource();
        const gainNode = audioCtx.createGain();
        source.buffer = angklungBuffer;
        source.loop = true; 
        source.loopStart = loopStartTime;
        source.loopEnd = loopEndTime;
        source.playbackRate.value = ratio;

        if (i === 1) {
            source.detune.value = 7 + (Math.random() * 5); 
        }

        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(1.0, now + 0.02); 
        
        source.connect(gainNode);
        gainNode.connect(dryGain);
        gainNode.connect(reverbGain);

        sources.push(source);
        gains.push(gainNode);
        source.start(now);
    }
    
    visualNode.classList.add('active');
    activeVoices[layerIdx] = { sources, gains, visualNode };
}

function clearAllVoices() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    Object.keys(activeVoices).forEach(layerIdx => {
        const v = activeVoices[layerIdx];
        if (v.visualNode) v.visualNode.classList.remove('active');
        try {
            v.gains.forEach((g) => {
                g.gain.cancelScheduledValues(now);
                g.gain.setValueAtTime(g.gain.value, now);
                g.gain.setTargetAtTime(0, now, 0.05);
            });
            v.sources.forEach((s) => s.stop(now + 0.2));
        } catch(e) {}
    });
    activeVoices = {};
}

document.getElementById('jsonInput').onchange=function(e){
    const reader=new FileReader();
    reader.onload=(ev)=>{
        try{
            rawData=JSON.parse(ev.target.result);
            
            // --- PEMROSESAN TEMPO BARU ---
            let tempoVal=parseFloat(rawData.tempo);
            // Jika nilainya desimal (spt 0.125), ubah durasi detik per ketukan tsb menjadi BPM
            if(tempoVal > 0 && tempoVal < 5) {
                globalTempo = Math.round(60 / (tempoVal * 4));
            } else {
                globalTempo = tempoVal > 0 ? tempoVal : 120;
            }
            
            // --- PEMROSESAN KEYBASE BARU ---
            let kb = rawData.keyBase !== undefined ? parseInt(rawData.keyBase) : 0;
            globalKeyBaseMidi = 60 + kb;
            
            document.getElementById('displayTempo').innerText=`BPM: ${globalTempo}`;
            render(rawData);
            document.getElementById('controls').style.display='flex';
        }catch(err){alert("File JSON tidak terbaca!");}
    };
    reader.readAsText(e.target.files[0]);
};

function render(data){
    const printArea=document.getElementById('print-area');
    printArea.innerHTML="";
    globalAllBars=[];
    
    // Menentukan nama kunci untuk judul
    let kb = data.keyBase !== undefined ? parseInt(data.keyBase) : 0;
    const KEY_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    let keyName = KEY_NAMES[((kb % 12) + 12) % 12];
    
    data.sections.forEach(sec=>{sec.bars.forEach(bar=>globalAllBars.push(bar));});
    totalBarsCount=globalAllBars.length;
    const BARS_PER_PAGE=20;
    
    for(let i=0;i<globalAllBars.length;i+=BARS_PER_PAGE){
        const pageEl=createNewPage(data.songTitle||"STUDI ANGKLUNG",globalTempo,Math.floor(i/BARS_PER_PAGE)+1, keyName);
        const staff=pageEl.querySelector('.staff-container');
        const pageBars=globalAllBars.slice(i,i+BARS_PER_PAGE);
        pageBars.forEach((barData,barIdx)=>{
            const gIdx=i+barIdx;
            const barEl=document.createElement('div');
            barEl.className="bar-box";
            barEl.id=`bar-${gIdx}`;
            barEl.innerHTML=`<span class="bar-num">${gIdx+1}</span>`;
            barData.grid.forEach((layer,lIdx)=>{
                const row=document.createElement('div');
                row.className="layer-row";
                for(let b=0;b<16;b+=4){
                    const ticks=layer.slice(b,b+4);
                    const beat=document.createElement('div');
                    beat.className="beat-unit";
                    beat.id=`beat-${gIdx}-${lIdx}-${b/4}`;
                    const active=ticks.filter(t=>t!=="").length;
                    if(active>=2) beat.classList.add('has-beam');
                    if(active===4) beat.classList.add('has-beam-2');
                    beat.innerHTML=ticks.map((t,tIdx)=>createNote(t,gIdx,lIdx,b+tIdx)).join("");
                    row.appendChild(beat);
                }
                barEl.appendChild(row);
            });
            staff.appendChild(barEl);
        });
        printArea.appendChild(pageEl);
    }
}

function createNote(v,bIdx,lIdx,tIdx){
    if(!v||v==="") return `<div class="note empty"></div>`;
    const midi = parseInt(v);
    const info = getAngklungNoteInfo(midi);
    const slash = info.label.includes("/") ? `<span class="slash">/</span>` : "";
    const clean = info.label.replace("/", "");
    let dots = "";
    if (info.octave === 1) dots = `<span class="dot dot-u">.</span>`;
    else if (info.octave === 2) dots = `<span class="dot dot-u2">..</span>`;
    else if (info.octave >= 3) dots = `<span class="dot dot-u2">...</span>`;
    else if (info.octave === -1) dots = `<span class="dot dot-d">.</span>`;
    else if (info.octave <= -2) dots = `<span class="dot dot-d2">..</span>`;
    return `<div class="note" id="nt-${bIdx}-${lIdx}-${tIdx}" data-midi="${v}">${dots}${slash}${clean}</div>`;
}

function togglePlay(){
    initAudio();
    if(audioCtx.state==='suspended') audioCtx.resume();
    if(isPlaying) pausePlayback();
    else startPlayback();
}

function startPlayback(){
    isPlaying=true;
    document.getElementById('btnPlay').innerText="PAUSE";
    const msPerTick=(60000/globalTempo)/4;
    playInterval=setInterval(()=>{
        const bIdx=Math.floor(currentTick/16);
        const tIdx=currentTick%16;
        const beatIdx=Math.floor(tIdx/4);

        if(tIdx % 4 === 0){
            document.querySelectorAll('.beat-unit.active-beat').forEach(el=>el.classList.remove('active-beat'));
            const columnBeats = document.querySelectorAll(`[id^="beat-${bIdx}-"][id$="-${beatIdx}"]`);
            columnBeats.forEach(beat => beat.classList.add('active-beat'));
            if(beatIdx === 0) {
                const curBar = document.getElementById(`bar-${bIdx}`);
                if(curBar) curBar.scrollIntoView({behavior:'smooth',block:'center'});
                document.getElementById('displayBar').innerText=`BAR: ${bIdx+1} / ${totalBarsCount}`;
            }
        }

        const layerNodes=document.querySelectorAll(`[id^="nt-${bIdx}-"][id$="-${tIdx}"]`);
        layerNodes.forEach((n) => {
            if(n.dataset.midi){
                const parts = n.id.split('-');
                const layerIndex = parts[2]; 
                playTone(parseInt(n.dataset.midi), layerIndex, n);
            }
        });

        currentTick++;
        if(currentTick>=totalBarsCount*16) stopPlayback();
    },msPerTick);
}

function pausePlayback(){
    isPlaying=false;
    clearInterval(playInterval);
    clearAllVoices(); 
    document.getElementById('btnPlay').innerText="RESUME";
}

function stopPlayback(){
    pausePlayback();
    currentTick=0;
    clearAllVoices();
    document.getElementById('btnPlay').innerText="PLAY";
    document.querySelectorAll('.note.active').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.beat-unit.active-beat').forEach(el=>el.classList.remove('active-beat'));
    window.scrollTo({top:0,behavior:'smooth'});
}

function createNewPage(title,tempo,pageNum,keyName){
    const page=document.createElement('div');
    page.className="a4-page";
    page.innerHTML=`
    <div class="sheet-header">
    <h1 class="text-xl font-black uppercase text-blue-900">${title}</h1>
    <div class="flex gap-4 text-[11px] font-bold text-gray-400">
    <span>Do = ${keyName}</span>
    <span>4/4</span>
    <span>T: ${tempo}</span>
    </div>
    </div>
    <div class="staff-container"></div>
    <div class="mt-auto text-right text-[9px] font-bold text-gray-200">TABKLUNG PRO | Hal. ${pageNum}</div>
    `;
    return page;
}

window.addEventListener('keydown',(e)=>{
    if(e.code==="Space"){e.preventDefault();togglePlay();}
    if(e.code==="Escape") stopPlayback();
});
</script>
</body>
</html>
